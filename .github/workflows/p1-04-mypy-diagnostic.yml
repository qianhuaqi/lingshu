name: Temporary P1-04 Mypy Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  mypy:
    if: github.head_ref == 'human/dodo/p1-04-http-value-model'
    runs-on: ubuntu-latest
    steps:
      - name: Clone and run mypy
        shell: bash
        run: |
          git clone -q --depth=1 --branch "$GITHUB_HEAD_REF" "https://github.com/$GITHUB_REPOSITORY.git" source
          cd source
          python -m pip install -q "mypy>=1.11,<2"
          mypy lingshu/http
