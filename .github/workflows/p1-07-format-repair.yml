name: Temporary P1-07 Ruff Repair

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'human/dodo/p1-07-runtime-record-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Repair and verify
        shell: bash
        run: |
          python -m pip install -q "ruff>=0.8,<1"
          ruff format lingshu/record tests/record tests/test_package_baseline.py
          python - <<'PY'
          from pathlib import Path
          path = Path("lingshu/record/writer.py")
          text = path.read_text()
          text = text.replace("import stat\n", "import stat\nfrom contextlib import suppress\n", 1)
          old = "        try:\n            os.chmod(self.root, stat.S_IRWXU)\n        except OSError:\n            pass\n"
          new = "        with suppress(OSError):\n            os.chmod(self.root, stat.S_IRWXU)\n"
          if text.count(old) != 1:
              raise SystemExit("chmod suppression target count is not one")
          path.write_text(text.replace(old, new, 1))
          PY
          ruff format lingshu/record tests/record tests/test_package_baseline.py
          ruff check lingshu/record tests/record tests/test_package_baseline.py
          ruff format --check lingshu/record tests/record tests/test_package_baseline.py
          rm .github/workflows/p1-07-format-repair.yml
      - name: Commit repair
        shell: bash
        run: |
          git config user.name qianhuaqi
          git config user.email 22343174+qianhuaqi@users.noreply.github.com
          git add -A
          git commit -s -m "style(record): satisfy Ruff contracts"
          git push origin HEAD:${{ github.head_ref }}
