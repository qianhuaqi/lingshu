name: Temporary P1-07 Format Repair

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'human/dodo/p1-07-runtime-record-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Format and verify
        shell: bash
        run: |
          python -m pip install -q "ruff>=0.8,<1"
          ruff format lingshu/record tests/record tests/test_package_baseline.py
          ruff check lingshu/record tests/record tests/test_package_baseline.py
          ruff format --check lingshu/record tests/record tests/test_package_baseline.py
          rm .github/workflows/p1-07-format-repair.yml
      - name: Commit repair
        shell: bash
        run: |
          git config user.name qianhuaqi
          git config user.email 22343174+qianhuaqi@users.noreply.github.com
          git add -A
          git commit -s -m "style(record): apply Ruff formatting"
          git push origin HEAD:${{ github.head_ref }}
