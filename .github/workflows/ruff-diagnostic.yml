name: Temporary P1-02 Ruff Repair

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'human/dodo/p1-02-static-config-snapshot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply exact Ruff repairs
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          config = Path("lingshu/core/config.py")
          text = config.read_text()
          old = '''        if self.name is not None:
              if not self.name or len(self.name) > 128 or _CONTROL.search(self.name):
                  raise ValueError(
                      "source name must be non-empty, bounded, and control-free"
                  )
          '''
          new = '''        if self.name is not None and (
              not self.name or len(self.name) > 128 or _CONTROL.search(self.name)
          ):
              raise ValueError("source name must be non-empty, bounded, and control-free")
          '''
          if old not in text:
              raise SystemExit("SIM102 target not found")
          text = text.replace(old, new, 1)
          old = '''            if redaction is RedactionClass.PUBLIC:
                  flat[key] = _thaw_nonsecret(value)
              elif redaction is RedactionClass.INTERNAL and include_internal:
                  flat[key] = _thaw_nonsecret(value)
          '''
          new = '''            if redaction is RedactionClass.PUBLIC or (
                  redaction is RedactionClass.INTERNAL and include_internal
              ):
                  flat[key] = _thaw_nonsecret(value)
          '''
          if old not in text:
              raise SystemExit("SIM114 target not found")
          config.write_text(text.replace(old, new, 1))

          test = Path("tests/core/test_config.py")
          text = test.read_text()
          old = "import pytest\n\nfrom lingshu.core.config"
          if old not in text:
              raise SystemExit("I001 target not found")
          test.write_text(text.replace(old, "import pytest\nfrom lingshu.core.config", 1))
          PY
          rm .github/workflows/ruff-diagnostic.yml
          python -m pip install -q "ruff>=0.8,<1"
          ruff check .
          ruff format --check .
      - name: Commit branch repair
        shell: bash
        run: |
          git config user.name qianhuaqi
          git config user.email 22343174+qianhuaqi@users.noreply.github.com
          git add lingshu/core/config.py tests/core/test_config.py .github/workflows/ruff-diagnostic.yml
          git commit -s -m "style(config): satisfy Ruff contracts"
          git push origin HEAD:${{ github.head_ref }}
